version: '3.8'
services:
  web:
    build: .
    ports:
      - "5011:5011"
    env_file: .env
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:5011/api/health')"]
      interval: 30s
      timeout: 5s
      retries: 3
